# for running in docker compose with prebuilt images

# version is now using "compose spec"
# v2 and v3 are now combined!
# docker-compose v1.27+ required

version: "3.8"

services:
  vote:
    image: sartaz1/vote-app:latest
    ports:
      - "8080:80"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - front-tier
      - back-tier
    restart: unless-stopped

  result:
    image: sartaz1/result-app:latest
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - front-tier
      - back-tier
    restart: unless-stopped

  worker:
    image: sartaz1/worker-app:latest
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - back-tier
    restart: unless-stopped

  redis:
    image: redis:alpine
    networks:
      - back-tier
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - back-tier
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db-data:

networks:
  front-tier:
  back-tier: