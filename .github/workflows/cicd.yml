name: CI/CD — Build, Test, Push, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ──────────────────────────────────────────
  # JOB 1: BUILD
  # ──────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build vote image
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: false
          tags: sartaz1/vote-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build result image
        uses: docker/build-push-action@v5
        with:
          context: ./result
          push: false
          tags: sartaz1/result-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: sartaz1/worker-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # JOB 2: TEST
  # ──────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test vote app
        run: |
          docker build -t vote-test ./vote
          docker run --rm vote-test python -m pytest tests/ -v || echo "No tests found, skipping"

      - name: Test result app
        run: |
          docker build -t result-test ./result
          docker run --rm result-test npm test || echo "No tests found, skipping"

      - name: Lint Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint < vote/Dockerfile || true
          docker run --rm -i hadolint/hadolint < result/Dockerfile || true
          docker run --rm -i hadolint/hadolint < worker/Dockerfile || true

  # ──────────────────────────────────────────
  # JOB 3: PUSH
  # ──────────────────────────────────────────
  push-images:
    name: Push images to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push vote image
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: true
          tags: |
            sartaz1/vote-app:latest
            sartaz1/vote-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push result image
        uses: docker/build-push-action@v5
        with:
          context: ./result
          push: true
          tags: |
            sartaz1/result-app:latest
            sartaz1/result-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            sartaz1/worker-app:latest
            sartaz1/worker-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # JOB 4: DEPLOY
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: push-images

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.images.yml"
          target: "/home/ubuntu/app/"

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            # write .env file
            echo "DOCKERHUB_USERNAME=sartaz1" > .env

            # pull latest images from Docker Hub
            docker compose -f docker-compose.images.yml pull

            # restart all containers
            docker compose -f docker-compose.images.yml up -d --remove-orphans

            # remove old images to free disk space
            docker image prune -f

            # confirm all containers are running
            docker compose -f docker-compose.images.yml ps

            